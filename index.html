<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--surface:#18181b;--surface2:#27272a;--border:#3f3f46;--text:#fafafa;--muted:#a1a1aa;--accent:#8b5cf6;--accent2:#c084fc;--green:#22c55e;--rose:#f43f5e;--amber:#f59e0b;--radius:16px;--radius-sm:10px}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

.app{min-height:100vh;display:flex;flex-direction:column;max-width:720px;margin:0 auto;padding:0 20px}

/* ====== CHAT ONBOARDING ====== */
.chat-container{flex:1;padding:80px 0 40px;display:flex;flex-direction:column}
.chat-messages{flex:1;display:flex;flex-direction:column;gap:16px;padding-bottom:20px}
.msg{max-width:85%;animation:msgIn 0.4s cubic-bezier(0.16,1,0.3,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg-bubble{padding:14px 18px;border-radius:var(--radius);line-height:1.5;font-size:0.92rem}
.msg.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.msg.user .msg-bubble{background:var(--accent);color:#fff}
.msg-time{font-size:0.65rem;color:var(--muted);margin-top:4px;padding:0 4px}
.msg.user .msg-time{text-align:right}
.typing-indicator{display:flex;gap:4px;padding:14px 18px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typeBounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:0.15s}
.typing-dot:nth-child(3){animation-delay:0.3s}
@keyframes typeBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Chat choices */
.chat-choices{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chat-choice{padding:10px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit}
.chat-choice:hover{border-color:var(--accent);transform:translateY(-1px)}
.chat-choice.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.chat-input-wrap{display:flex;gap:8px;margin-top:10px}
.chat-input{flex:1;padding:12px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:0.9rem;font-family:inherit;outline:none;transition:border 0.2s}
.chat-input:focus{border-color:var(--accent)}
.chat-send{padding:12px 20px;border-radius:100px;border:none;background:var(--accent);color:#fff;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit}
.chat-send:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(139,92,246,0.3)}

/* AI thinking bubble */
.ai-thinking{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-top:8px;font-size:0.82rem;color:var(--muted);animation:msgIn 0.3s ease}
.ai-thinking strong{color:var(--accent);font-weight:600}

/* ====== SCHEDULE VIEW ====== */
#schedule-view{display:none;padding:80px 0 60px}
.s-header{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.s-header h1{font-size:clamp(1.4rem,3vw,1.8rem);font-weight:700;letter-spacing:-0.02em}
.s-tag{display:inline-block;padding:3px 12px;border-radius:100px;font-size:0.7rem;font-weight:600;background:rgba(139,92,246,0.15);color:var(--accent);margin-top:4px}

/* Nav tabs */
.nav-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:100px;padding:4px;border:1px solid var(--border)}
.nav-tab{flex:1;padding:10px;border:none;border-radius:100px;background:transparent;color:var(--muted);font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit}
.nav-tab.active{background:var(--accent);color:#fff}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.dash-card .dv{font-size:1.4rem;font-weight:700}
.dash-card .dl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.ring-wrap{position:relative;width:70px;height:70px;margin:0 auto 6px}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--surface2);stroke-width:5}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.8s cubic-bezier(0.16,1,0.3,1)}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700}

/* Strategy */
.section-title{font-size:0.75rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.info-box li{font-size:0.83rem;color:var(--muted);padding:4px 0 4px 16px;position:relative;line-height:1.5;list-style:none}
.info-box li::before{content:'';position:absolute;left:0;top:11px;width:5px;height:5px;border-radius:50%;background:var(--accent)}

/* Timeline */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:var(--border)}
.t-block{position:relative;margin-bottom:10px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);transition:all 0.3s cubic-bezier(0.16,1,0.3,1)}
.t-block::before{content:'';position:absolute;left:-23px;top:20px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);transition:all 0.3s}
.t-block.active::before{background:var(--green);box-shadow:0 0 8px var(--green)}
.t-block.done::before{background:var(--muted)}
.t-block.done{opacity:0.5}
.t-block.completing{animation:cardLift 0.4s cubic-bezier(0.16,1,0.3,1)}
@keyframes cardLift{0%{transform:scale(1)}30%{transform:scale(1.01) translateY(-2px)}100%{transform:scale(1) translateY(0)}}
.t-block .glow{position:absolute;inset:-1px;border-radius:var(--radius-sm);border:2px solid var(--green);opacity:0;pointer-events:none;animation:glowP 0.6s ease-out forwards}
@keyframes glowP{0%{opacity:0.7;transform:scale(1)}100%{opacity:0;transform:scale(1.02)}}
.t-time{font-size:0.68rem;color:var(--accent);font-weight:700;letter-spacing:0.5px}
.t-title{font-size:0.88rem;font-weight:600;margin:2px 0;transition:all 0.3s}
.t-block.done .t-title{text-decoration:line-through;text-decoration-color:var(--muted);animation:strike 0.4s ease-out}
@keyframes strike{from{text-decoration-color:transparent}to{text-decoration-color:var(--muted)}}
.t-desc{font-size:0.78rem;color:var(--muted);line-height:1.4}
.t-reason{font-size:0.68rem;color:var(--accent);opacity:0.5;margin-top:2px;font-style:italic}
.t-icon{position:absolute;right:12px;top:12px;font-size:1rem}
.t-check{position:absolute;right:12px;bottom:10px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);font-size:0.65rem;color:transparent;overflow:visible}
.t-check:hover{border-color:var(--green);transform:scale(1.1)}
.t-check:active{transform:scale(0.9)}
.t-check.checked{background:var(--green);border-color:var(--green);color:#fff;animation:checkB 0.4s cubic-bezier(0.16,1,0.3,1)}
@keyframes checkB{0%{transform:scale(0.8)}40%{transform:scale(1.2)}70%{transform:scale(0.95)}100%{transform:scale(1)}}
.t-check .ripple{position:absolute;width:100%;height:100%;border-radius:50%;background:rgba(34,197,94,0.3);animation:rippleO 0.5s ease-out forwards;pointer-events:none}
@keyframes rippleO{0%{transform:scale(1);opacity:0.6}100%{transform:scale(2.5);opacity:0}}

/* XP float */
.xp-float{position:fixed;z-index:200;font-size:0.82rem;font-weight:700;color:var(--accent);pointer-events:none;animation:xpUp 1.2s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes xpUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-30px) scale(1.1)}100%{opacity:0;transform:translateY(-60px) scale(0.9)}}

/* Encouragement */
.enc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:0.82rem;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;gap:8px;opacity:0;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);pointer-events:none;white-space:nowrap}
.enc-toast.show{opacity:1}

/* Confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:150}

/* Streak card */
.streak-card{background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(244,63,94,0.08));border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:16px;text-align:center;display:none}
.streak-card.show{display:block;animation:msgIn 0.5s cubic-bezier(0.16,1,0.3,1)}
.streak-fire{font-size:2.5rem;margin-bottom:8px;display:inline-block;animation:fireG 1s ease-in-out infinite alternate}
@keyframes fireG{from{filter:brightness(1)}to{filter:brightness(1.3)}}
.streak-title{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.streak-sub{font-size:0.82rem;color:var(--muted)}
.streak-stats{display:flex;justify-content:center;gap:28px;margin-top:14px}
.streak-stat .sv{font-size:1.3rem;font-weight:700;color:var(--accent)}
.streak-stat .sl{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* History view */
.history-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:20px}
.history-day{text-align:center;padding:10px 4px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);cursor:default;transition:all 0.2s}
.history-day.today{border-color:var(--accent)}
.history-day .hd-day{font-size:0.65rem;color:var(--muted);text-transform:uppercase}
.history-day .hd-pct{font-size:1rem;font-weight:700;margin:4px 0}
.history-day .hd-bar{height:3px;border-radius:2px;background:var(--surface2);overflow:hidden}
.history-day .hd-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s}
.history-day.future{opacity:0.3}

/* Milestone */
.milestone-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.milestone-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.milestone-title{font-size:0.88rem;font-weight:600}
.milestone-pct{font-size:0.75rem;color:var(--accent);font-weight:600}
.milestone-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.milestone-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width 0.6s}

.edit-btn{display:block;margin:20px auto 0;padding:10px 28px;border:1px solid var(--border);border-radius:100px;background:transparent;color:var(--muted);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit}
.edit-btn:hover{border-color:var(--accent);color:var(--text)}

@media(max-width:600px){
  .dash-grid{grid-template-columns:repeat(3,1fr)}
  .history-week{grid-template-columns:repeat(7,1fr)}
  .streak-stats{gap:16px}
}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="enc-toast" id="enc-toast"><span id="e-emoji"></span><span id="e-text"></span></div>

<div class="app">
  <!-- Chat Onboarding -->
  <div class="chat-container" id="chat-container">
    <div class="chat-messages" id="chat-messages"></div>
    <div id="chat-input-area"></div>
  </div>

  <!-- Schedule View -->
  <div id="schedule-view">
    <div class="s-header">
      <div><h1 id="s-title">Your Day</h1><div class="s-tag" id="s-tag"></div></div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('today')">Today</button>
      <button class="nav-tab" onclick="showTab('history')">History</button>
      <button class="nav-tab" onclick="showTab('milestones')">Milestones</button>
    </div>

    <!-- Today -->
    <div id="tab-today">
      <div class="dash-grid">
        <div class="dash-card">
          <div class="ring-wrap"><svg class="ring-svg" width="70" height="70" viewBox="0 0 70 70"><circle class="ring-bg" cx="35" cy="35" r="30"/><circle class="ring-fill" id="ring-fill" cx="35" cy="35" r="30" stroke-dasharray="188.5" stroke-dashoffset="188.5"/></svg><div class="ring-text" id="ring-text">0%</div></div>
          <div class="dl">Progress</div>
        </div>
        <div class="dash-card"><div class="dv" id="tasks-left">0</div><div class="dl">Remaining</div></div>
        <div class="dash-card"><div class="dv" id="time-left">0h</div><div class="dl">Time Left</div></div>
      </div>
      <div class="info-box" id="ai-context" style="margin-bottom:16px;padding:14px 18px;font-size:0.85rem;color:var(--muted);border-left:3px solid var(--accent)"></div>
      <div class="section-title">Strategy</div>
      <div class="info-box" id="strategy-box"><ul id="strategy-list"></ul></div>
      <div class="section-title">Tasks</div>
      <div class="timeline" id="timeline"></div>
      <div class="streak-card" id="streak-card">
        <div class="streak-fire" id="streak-fire">🔥</div>
        <div class="streak-title">Day Complete!</div>
        <div class="streak-sub">Outstanding work. See you tomorrow.</div>
        <div class="streak-stats">
          <div class="streak-stat"><div class="sv" id="s-streak">0</div><div class="sl">Day Streak</div></div>
          <div class="streak-stat"><div class="sv" id="s-pct">100%</div><div class="sl">Completed</div></div>
          <div class="streak-stat"><div class="sv" id="s-xp">+0</div><div class="sl">XP Earned</div></div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div id="tab-history" style="display:none">
      <div class="section-title">This Week</div>
      <div class="history-week" id="history-week"></div>
      <div class="section-title" style="margin-top:20px">Weekly Summary</div>
      <div class="info-box" id="weekly-summary"></div>
      <div class="section-title" style="margin-top:20px">Trends</div>
      <div class="info-box" id="trends-box"></div>
    </div>

    <!-- Milestones -->
    <div id="tab-milestones" style="display:none">
      <div class="section-title">Your Milestones</div>
      <div id="milestones-list"></div>
    </div>

    <button class="edit-btn" onclick="resetAll()">← Start Over</button>
  </div>
</div>

<script>
// ====== DATA LAYER ======
const DB_KEY='planner_ai_data';
function loadData(){try{return JSON.parse(localStorage.getItem(DB_KEY))||{plans:{},profile:null,streak:0,lastDay:null,totalXP:0}}catch(e){return{plans:{},profile:null,streak:0,lastDay:null,totalXP:0}}}
function saveData(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}
let data=loadData();

function getToday(){return new Date().toISOString().split('T')[0]}
function getDayName(d){return new Date(d+'T12:00:00').toLocaleDateString('en',{weekday:'short'})}

// ====== AI PROFILE ======
function buildProfile(inputs){
  const p={goal:inputs.goal,desc:inputs.desc,lifestyle:inputs.lifestyle,workStart:inputs.workStart||null,workEnd:inputs.workEnd||null,commute:inputs.commute||0,productivity:inputs.productivity,prefs:inputs.prefs||[]};
  // AI decides times based on goal and lifestyle
  if(p.productivity==='morning'||p.productivity==='flexible'){p.wakeTime='06:00';p.bedTime='22:00'}
  else if(p.productivity==='night'){p.wakeTime='08:00';p.bedTime='00:00'}
  else{p.wakeTime='06:30';p.bedTime='22:30'}
  // Adjust for lifestyle
  if(p.lifestyle==='working'&&p.workStart){
    const ws=parseInt(p.workStart.split(':')[0]);
    if(ws<=8&&p.wakeTime>'06:00')p.wakeTime='05:45';
  }
  // AI milestones
  p.milestones=generateMilestones(p);
  // Learning data
  p.skippedHistory={};
  p.avgCompletion=0;
  p.daysTracked=0;
  return p;
}

function generateMilestones(p){
  const m=[];
  const d=p.desc||p.goal;
  if(p.goal==='fitness'){
    m.push({title:'Build workout habit',target:21,current:0,unit:'days'});
    m.push({title:'Complete 50 workouts',target:50,current:0,unit:'workouts'});
    m.push({title:'Hit weight goal',target:100,current:0,unit:'% progress'});
  }else if(p.goal==='study'||p.goal==='coding'){
    m.push({title:'Study 100 hours',target:100,current:0,unit:'hours'});
    m.push({title:'Complete 30 study days',target:30,current:0,unit:'days'});
    m.push({title:'Finish main project',target:100,current:0,unit:'% complete'});
  }else if(p.goal==='business'){
    m.push({title:'Work on business 30 days',target:30,current:0,unit:'days'});
    m.push({title:'Reach first revenue',target:1,current:0,unit:'milestone'});
    m.push({title:'Build audience',target:100,current:0,unit:'followers'});
  }else{
    m.push({title:'Build consistency',target:21,current:0,unit:'days'});
    m.push({title:'Reach halfway',target:50,current:0,unit:'% complete'});
    m.push({title:'Achieve goal',target:100,current:0,unit:'% complete'});
  }
  return m;
}

// ====== TASK GENERATION ======
function generateTasks(profile,history){
  const p=profile;
  const wake=timeToMin(p.wakeTime);
  const bed=timeToMin(p.bedTime)>wake?timeToMin(p.bedTime):timeToMin(p.bedTime)+1440;
  const hasCommit=p.workStart&&p.workEnd;
  const commitS=hasCommit?timeToMin(p.workStart):null;
  const commitE=hasCommit?timeToMin(p.workEnd):null;
  const commute=p.commute||0;
  const isMorning=p.productivity==='morning';
  const prefs=p.prefs||[];
  const hasWorkout=prefs.includes('morning-workout')||prefs.includes('evening-workout')||p.goal==='fitness';
  const morningWorkout=prefs.includes('morning-workout')||(p.goal==='fitness'&&!prefs.includes('evening-workout'));

  // Learn from history: remove consistently skipped tasks
  const skippedNames=Object.entries(p.skippedHistory||{}).filter(([,v])=>v>=3).map(([k])=>k);

  let blocks=[];const add=(s,d,t,desc,icon,reason)=>blocks.push({start:s,dur:d,title:t,desc,icon,reason:reason||''});

  // Morning
  add(wake,5,'Hydrate','500ml water. Rehydrate.','💧','Dehydration impairs cognition 14%.');
  add(wake+5,10,'Morning Routine','Freshen up. No phone.','☀️','No phone 15 min = proactive mindset.');
  add(wake+15,5,'Plan the Day','Set 3 priorities.','📋','Morning planning activates RAS.');
  let cursor=wake+20;
  if(prefs.includes('meditation')&&!skippedNames.includes('Meditation')){add(cursor,15,'Meditation','Breathe. Focus.','🧘','13 min reduces cortisol, boosts focus 4-6h.');cursor+=15}
  if(prefs.includes('journal')&&!skippedNames.includes('Journaling')){add(cursor,10,'Journaling','Thoughts, goals.','📝','Clarifies thinking before deep work.');cursor+=10}

  const breakfastTime=cursor;
  add(breakfastTime,25,'Breakfast','Protein + complex carbs.','🍳','Protein prevents crash. 4-5h to lunch.');cursor=breakfastTime+25;

  // Morning workout
  if(hasWorkout&&morningWorkout&&!skippedNames.includes('Workout')){
    add(cursor,5,'Warm Up','Dynamic stretch.','🧘','');
    cursor+=5;
    const goalDesc=p.desc||'your goal';
    add(cursor,45,'Workout',p.goal==='fitness'?`Train: ${goalDesc}`:'Full body.','💪','Morning: cortisol aligns, EPOC 8+ hours.');
    cursor+=45;add(cursor,15,'Post-Workout','Protein + stretch.','🥤','Anabolic window 30-45 min.');cursor+=15;
  }

  // Deep work morning
  const beforeCommit=hasCommit?commitS-commute:bed-180;
  const morningAvail=Math.min(beforeCommit-cursor,isMorning?240:150);
  if(morningAvail>=45){
    const sessions=morningAvail>=120?2:1;const sLen=Math.floor(morningAvail/sessions);
    const mg=getGoalBlock(p,'morning');
    for(let i=0;i<sessions;i++){
      add(cursor+i*sLen,sLen-5,mg.title,mg.desc,mg.icon,mg.reason);
      if(i<sessions-1)add(cursor+(i+1)*sLen-5,5,'Break','Stand, hydrate.','🚶','Ultradian reset 90 min.');
    }
    cursor+=morningAvail;
  }

  // Commitments
  if(hasCommit&&commute>0){add(cursor,commute,'Commute','Podcast/audiobook.','🚗','Passive learning.');cursor+=commute}
  if(hasCommit){add(commitS,commitE-commitS,'Commitment',`${fmtTime(commitS)} – ${fmtTime(commitE)}`,'💼','Fixed block.');cursor=commitE}
  if(hasCommit&&commute>0){add(cursor,commute,'Commute Back','Decompress.','🚗','');cursor+=commute}

  // Lunch
  let lunchTime=Math.max(cursor,timeToMin('12:00'));lunchTime=Math.max(lunchTime,breakfastTime+240);
  if(lunchTime<wake)lunchTime+=1440;
  add(lunchTime,30,'Lunch','Protein, veggies, light.','🍽️','4-5h from breakfast. Heavy = crash.');cursor=lunchTime+30;

  // Afternoon break
  if(cursor<timeToMin('15:00')&&cursor>lunchTime+10){add(cursor,10,'Break','Walk outside.','🚶','Post-lunch dip. Walk > caffeine.');cursor+=10}

  // Afternoon deep work
  const aftEnd=Math.min(bed-150,timeToMin('18:00'));const aftAvail=aftEnd-cursor;
  if(aftAvail>=45){
    const sessions=aftAvail>=120?2:1;const sLen=Math.floor(aftAvail/sessions);
    const ag=getGoalBlock(p,'afternoon');
    for(let i=0;i<sessions;i++){add(cursor+i*sLen,sLen-5,ag.title,ag.desc,ag.icon,ag.reason);if(i<sessions-1)add(cursor+(i+1)*sLen-5,5,'Break','Quick movement.','🚶','')}
    cursor=aftEnd;
  }

  // Evening workout
  if(hasWorkout&&prefs.includes('evening-workout')&&!skippedNames.includes('Workout')){
    add(cursor,5,'Warm Up','Dynamic stretch.','🧘','');cursor+=5;
    add(cursor,45,'Workout',p.desc?`Train: ${p.desc}`:'Cardio + strength.','💪','Evening: body temp peaks, strength +10%.');cursor+=50;
  }

  // Dinner
  let dinnerTime=Math.max(cursor,timeToMin('19:00'));dinnerTime=Math.max(dinnerTime,lunchTime+300);
  if(dinnerTime<wake)dinnerTime+=1440;
  add(dinnerTime,30,'Dinner','Light, nutritious. 3h before bed.','🍽️','3h gap improves sleep 40%.');cursor=dinnerTime+30;

  // Evening extras
  const windDown=bed-40;
  if(prefs.includes('reading')&&!skippedNames.includes('Reading')&&cursor<windDown){add(cursor,30,'Reading','Book. Physical > digital.','📖','Improves sleep quality.');cursor+=30}
  if(prefs.includes('social')&&!skippedNames.includes('Social Time')&&cursor<windDown){add(cursor,30,'Social','Call a friend.','💬','#1 happiness predictor.');cursor+=30}
  if(prefs.includes('music')&&!skippedNames.includes('Music Practice')&&cursor<windDown){add(cursor,20,'Music Practice','Play instrument.','🎵','Consolidates motor learning.');cursor+=20}
  if(prefs.includes('gaming')&&cursor<windDown){const g=Math.min(30,windDown-cursor);if(g>0){add(cursor,g,'Free Time','Decompress.','🎮','White space prevents burnout.');cursor+=g}}
  if(prefs.includes('free')&&cursor<windDown){const f=Math.min(30,windDown-cursor);if(f>0){add(cursor,f,'Free Time','Do what you want.','🎮','Unscheduled = creativity.');cursor+=f}}

  // Wind down
  add(windDown,15,'Review Day','What got done? Wins?','📝','Reflection consolidates learning.');
  add(windDown+15,15,'Wind Down','No screens. Dim lights.','📖','Blue light suppresses melatonin 50%.');
  add(windDown+30,10,'Sleep','Lights out.','🌙','Consistent times > total hours.');

  // Clean overlaps
  blocks.sort((a,b)=>a.start-b.start);
  const clean=[];
  for(const b of blocks){if(b.start<wake||b.start>=bed)continue;if(clean.length){const last=clean[clean.length-1];if(b.start<last.start+last.dur){last.dur=Math.max(last.dur,(b.start+b.dur)-last.start);continue}}clean.push({...b})}
  return clean;
}

function getGoalBlock(p,time){
  const d=p.desc||'your goal';
  const m={fitness:{title:'Training',desc:`${d}`,icon:'💪',reason:'Peak energy for max performance.'},study:{title:'Deep Study',desc:`Study: ${d}`,icon:'🧠',reason:time==='morning'?'Morning: working memory peaks.':'Afternoon: review.'},coding:{title:'Deep Coding',desc:`Build: ${d}`,icon:'💻',reason:'90-min blocks for flow state.'},business:{title:time==='morning'?'Revenue Activity':'Build & Improve',desc:`${d}`,icon:time==='morning'?'💰':'🛠️',reason:'Revenue first.'},creative:{title:time==='morning'?'Creative Work':'Refine',desc:`${d}`,icon:'🎨',reason:'Morning: divergent. Afternoon: convergent.'},productivity:{title:'Deep Work',desc:`Focus: ${d}`,icon:'🎯',reason:'Peak hours for impact.'},mental:{title:'Self-Care',desc:`${d}`,icon:'💚',reason:'Daily maintenance.'},custom:{title:'Goal Work',desc:`${d}`,icon:'🎯',reason:'Focused work at peak hours.'}};
  return m[p.goal]||m.custom;
}

// ====== CONTEXTUAL ENCOURAGEMENT ======
function getContextMessage(completed,total, streak,timeOfDay){
  const pct=total?completed/total:0;
  const hour=new Date().getHours();

  // Time-based
  if(completed===0&&hour<10) return{e:'🌅',t:'Good morning. Ready to make today count?'};
  if(completed===0) return{e:'👋',t:'Welcome back. Let\'s get started.'};

  // Progress-based
  if(pct<0.25) return{e:'🚀',t:`${completed} down, ${total-completed} to go. You're building momentum.`};
  if(pct>=0.25&&pct<0.5) return{e:'⚡',t:`${Math.round(pct*100)}% done. You're past the hardest part — starting.`};
  if(pct>=0.5&&pct<0.75) return{e:'🔥',t:`Halfway there. Consistency beats intensity.`};
  if(pct>=0.75&&pct<1) return{e:'💪',t:`${total-completed} left. Finish strong.`};

  // All done
  if(pct>=1){
    if(streak>=7) return{e:'🏆',t:`${streak}-day streak! You're in the top 1%.`};
    if(streak>=3) return{e:'🔥',t:`${streak} days in a row. This is who you are now.`};
    return{e:'🎉',t:'All tasks complete. Your future self thanks you.'};
  }

  return{e:'✨',t:`${completed}/${total} done. Keep going.`};
}

let chatStep=0;let chatInputs={};let chatEl=document.getElementById('chat-messages');let inputArea=document.getElementById('chat-input-area');

function addMsg(type,text,choices,inputType){
  return new Promise(resolve=>{
    // Typing indicator
    if(type==='ai'){
      const typing=document.createElement('div');typing.className='msg ai';typing.id='typing';
      typing.innerHTML=`<div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
      chatEl.appendChild(typing);chatEl.scrollTop=chatEl.scrollHeight;
      setTimeout(()=>{typing.remove();appendMsg(type,text,choices,inputType,resolve)},800+Math.random()*600);
    }else{
      appendMsg(type,text,null,null,resolve);
    }
  });
}

function appendMsg(type,text,choices,inputType,resolve){
  const msg=document.createElement('div');msg.className=`msg ${type}`;
  const now=new Date();const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  let html=`<div class="msg-bubble">${text}</div><div class="msg-time">${time}</div>`;
  if(choices) html+=`<div class="chat-choices">${choices.map(c=>`<button class="chat-choice" data-val="${c.val}">${c.label}</button>`).join('')}</div>`;
  msg.innerHTML=html;chatEl.appendChild(msg);chatEl.scrollTop=chatEl.scrollHeight;

  if(choices){
    msg.querySelectorAll('.chat-choice').forEach(btn=>{
      btn.addEventListener('click',()=>{
        msg.querySelectorAll('.chat-choice').forEach(b=>b.style.pointerEvents='none');
        btn.classList.add('selected');
        addMsg('user',btn.textContent);
        setTimeout(()=>resolve(btn.dataset.val),300);
      });
    });
  }else if(inputType==='text'){
    const wrap=document.createElement('div');wrap.className='chat-input-wrap';
    wrap.innerHTML=`<input class="chat-input" id="chat-in" placeholder="${inputType==='text'?'Type here...':''}" autofocus><button class="chat-send">Send</button>`;
    inputArea.innerHTML='';inputArea.appendChild(wrap);
    const inp=wrap.querySelector('input');const btn=wrap.querySelector('button');
    const submit=()=>{if(inp.value.trim()){addMsg('user',inp.value.trim());inputArea.innerHTML='';setTimeout(()=>resolve(inp.value.trim()),300)}};
    btn.addEventListener('click',submit);inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});inp.focus();
  }else if(inputType==='time'){
    const wrap=document.createElement('div');wrap.className='chat-input-wrap';
    wrap.innerHTML=`<input class="chat-input" id="chat-in" type="time" value="06:00" style="flex:1"><button class="chat-send">Set</button>`;
    inputArea.innerHTML='';inputArea.appendChild(wrap);
    const inp=wrap.querySelector('input');const btn=wrap.querySelector('button');
    const submit=()=>{addMsg('user',fmtTime(timeToMin(inp.value)));inputArea.innerHTML='';setTimeout(()=>resolve(inp.value),300)};
    btn.addEventListener('click',submit);inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
  }else{
    inputArea.innerHTML='';
  }
}

let scheduleBlocks=[];let completedCount=0;let totalBlocks=0;
let soundEnabled=true;

function startSchedule(){

  document.getElementById('schedule-view').style.display='block';
  const p=data.profile;
  document.getElementById('s-title').textContent="Your Optimized Day";
  const gn={fitness:'Get Fit',study:'Learn a Skill',coding:'Build Something',business:'Start a Business',creative:'Create',productivity:'Be Productive',mental:'Feel Better',custom:'Custom Goal'};
  document.getElementById('s-tag').textContent=gn[p.goal]||p.goal;

  // AI context
  const ctx= document.getElementById('ai-context');
  const hour=new Date().getHours();
  let contextText=`I've scheduled your day based on your ${p.productivity} productivity pattern. `;
  if(p.workStart)contextText+=`Working around your ${fmtTime(timeToMin(p.workStart))}–${fmtTime(timeToMin(p.workEnd))} commitment. `;
  if(hour<10)contextText+=`Good morning — your peak focus window is ahead.`;
  else if(hour<14)contextText+=`Midday check-in. You're in your afternoon block.`;
  else if(hour<18)contextText+=`Afternoon. Energy may dip — I've placed lighter tasks here.`;
  else contextText+=`Evening. Wind-down phase. Protect your sleep.`;
  ctx.textContent=contextText;

  const tasks=generateTasks(p,data.plans);
  scheduleBlocks=tasks;totalBlocks=tasks.length;completedCount=0;

  // Restore today's progress
  const today=getToday();
  if(data.plans[today]){
    const saved=data.plans[today];
    completedCount=saved.completed?saved.completed.length:0;
  }

  const strategies=[];
  const sleepHrs=((1440-(timeToMin(p.bedTime)-timeToMin(p.wakeTime)))/60).toFixed(1);
  strategies.push(`Sleep: ${sleepHrs}h. ${parseFloat(sleepHrs)>=7?'Optimal range.':'Consider earlier bedtime.'}`);
  if(p.productivity==='morning')strategies.push('Deep work in AM — peak cortisol window.');
  else if(p.productivity==='night')strategies.push('Deep work in PM — creative peak.');
  else strategies.push('Deep work split AM + PM for balance.');
  strategies.push('Meals every 4-5h for stable blood sugar.');
  strategies.push('90-min focus blocks match ultradian rhythm.');
  if(p.prefs.includes('meditation'))strategies.push('Meditation primes prefrontal cortex.');

  // Learn from history
  const skipped=Object.entries(p.skippedHistory||{}).filter(([,v])=>v>=2);
  if(skipped.length)strategies.push(`Adjusted: removed "${skipped.map(([k])=>k).join('", "')}" — you've skipped these 2+ times.`);

  document.getElementById('strategy-list').innerHTML=strategies.map(s=>`<li>${s}</li>`).join('');

  renderTimeline();updateDash();showTodayTab();checkDayProgress();
}

function renderTimeline(){
  const tl=document.getElementById('timeline');tl.innerHTML='';
  const now=new Date();const cm=now.getHours()*60+now.getMinutes();
  const today=getToday();const saved=data.plans[today];const completed=saved?saved.completed||[]:[];

  scheduleBlocks.forEach((item,i)=>{
    const end=item.start+item.dur;
    const el=document.createElement('div');el.className='t-block';el.dataset.idx=i;
    if(completed.includes(i))el.classList.add('done');
    else if(cm>=end)el.classList.add('done');
    else if(cm>=item.start&&cm<end)el.classList.add('active');

    el.innerHTML=`<div class="t-time">${fmtTime(item.start)} — ${fmtTime(end)} · ${durStr(item.dur)}</div><div class="t-title">${item.title}</div><div class="t-desc">${item.desc}</div>${item.reason?`<div class="t-reason">${item.reason}</div>`:''}<div class="t-icon">${item.icon}</div><button class="t-check ${completed.includes(i)?'checked':''}" onclick="completeTask(this,${i})">✓</button>`;
    tl.appendChild(el);
  });
}

function completeTask(btn,idx){
  if(btn.classList.contains('checked'))return;
  btn.classList.add('checked');playClick();
  if(navigator.vibrate)navigator.vibrate(10);

  const ripple=document.createElement('span');ripple.className='ripple';btn.appendChild(ripple);setTimeout(()=>ripple.remove(),500);
  const block=btn.closest('.t-block');block.classList.add('completing');setTimeout(()=>block.classList.remove('completing'),400);
  const glow=document.createElement('div');glow.className='glow';block.appendChild(glow);setTimeout(()=>glow.remove(),600);
  block.classList.add('done');completedCount++;

  const rect=btn.getBoundingClientRect();
  showXP(25,rect.left);spawnConfetti(8);

  // Contextual message
  const msg=getContextMessage(completedCount,totalBlocks,data.streak);
  showEncouragement(msg.e,msg.t);
  updateDash();saveTodayProgress();

  if(completedCount===totalBlocks)setTimeout(()=>dayComplete(),600);
}

function saveTodayProgress(){
  const today=getToday();
  if(!data.plans[today])data.plans[today]={tasks:[]};
  const completed=[];
  document.querySelectorAll('.t-check.checked').forEach((_,i)=>completed.push(i));
  data.plans[today].completed=completed;
  data.plans[today].completionPct=totalBlocks?Math.round((completedCount/totalBlocks)*100):0;
  data.plans[today].profile=data.profile;
  // Track skipped
  const skipped=[];
  document.querySelectorAll('.t-block').forEach((block,i)=>{
    const check=block.querySelector('.t-check');
    if(!check.classList.contains('checked'))skipped.push(block.querySelector('.t-title').textContent);
  });
  data.plans[today].skippedTasks=skipped;
  saveData(data);
}

function dayComplete(){
  playDayComplete();spawnConfetti(30);setTimeout(()=>spawnConfetti(20),300);
  const today=getToday();
  if(data.lastDay!==today){
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    if(data.lastDay===yesterday.toDateString())data.streak++;
    else data.streak=1;
    data.lastDay=today;
  }
  data.totalXP+=totalBlocks*25;
  // Update milestones
  if(data.profile&&data.profile.milestones){
    data.profile.milestones[0].current=Math.min(data.profile.milestones[0].current+1,data.profile.milestones[0].target);
    data.profile.daysTracked=(data.profile.daysTracked||0)+1;
  }
  // Update skipped history
  const skipped=data.plans[today]?.skippedTasks||[];
  skipped.forEach(t=>{data.profile.skippedHistory[t]=(data.profile.skippedHistory[t]||0)+1});
  saveData(data);

  const card=document.getElementById('streak-card');card.classList.add('show');
  document.getElementById('s-streak').textContent=data.streak;
  document.getElementById('s-pct').textContent='100%';
  document.getElementById('s-xp').textContent=`+${totalBlocks*25}`;
  document.getElementById('streak-fire').style.fontSize=Math.min(2.5+data.streak*0.3,5)+'rem';
  card.scrollIntoView({behavior:'smooth',block:'center'});
}

function updateDash(){
  const pct=totalBlocks?Math.round((completedCount/totalBlocks)*100):0;
  const remaining=totalBlocks-completedCount;
  let totalMin=0;const now=new Date().getHours()*60+new Date().getMinutes();
  scheduleBlocks.forEach((b,i)=>{
    const checks=document.querySelectorAll('.t-check');
    if(checks[i]&&!checks[i].classList.contains('checked')&&b.start>=now)totalMin+=b.dur;
  });
  document.getElementById('ring-text').textContent=pct+'%';
  document.getElementById('tasks-left').textContent=remaining;
  document.getElementById('time-left').textContent=durStr(totalMin);
  const circ=2*Math.PI*30;
  document.getElementById('ring-fill').style.strokeDashoffset=circ-(pct/100)*circ;
}

    <li>Current streak: ${data.streak} days</li>

  `;

  // Trends
  const trends=[];
  if(avgPct>=80)trends.push('📈 Strong week. You\'re operating at a high level.');
  else if(avgPct>=50)trends.push('📊 Decent week. Room to improve consistency.');
  else if(avgPct>0)trends.push('📉 Tough week. Consider lighter daily targets.');
  else trends.push('🆕 No data yet. Complete today\'s tasks to start tracking.');

  // Skipped task analysis
  if(data.profile?.skippedHistory){

function showTodayTab(){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.style.display='none');
  document.querySelector('.nav-tab').classList.add('active');
  document.getElementById('tab-today').style.display='block';
}

// ====== UTILITIES ======
function timeToMin(t){const [h,m]=t.split(':').map(Number);return h*60+m}
function minToTime(m){const h=Math.floor(((m%1440)+1440)%1440/60);const mm=((m%1440)+1440)%1440%60;return`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}
function fmtTime(m){let[h,mm]=minToTime(m).split(':').map(Number);return`${h%12||12}:${String(mm).padStart(2,'0')} ${h>=12?'PM':'AM'}`}
function durStr(min){return min>=60?`${Math.floor(min/60)}h${min%60?' '+min%60+'m':''}`:`${min}m`}

// ====== EFFECTS ======
function playClick(){if(!soundEnabled)return;try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=800;g.gain.value=0.1;g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);o.start();o.stop(ctx.currentTime+0.08)}catch(e){}}
function playDayComplete(){if(!soundEnabled)return;try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.value=0.07;g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2+i*0.12);o.start(ctx.currentTime+i*0.12);o.stop(ctx.currentTime+0.2+i*0.12)})}catch(e){}}

function showEncouragement(emoji,text){
  const toast=document.getElementById('enc-toast');
  document.getElementById('e-emoji').textContent=emoji;
  document.getElementById('e-text').textContent=text;
  toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2800);
}
function showXP(x,y){const el=document.createElement('div');el.className='xp-float';el.textContent=`+${x} XP`;el.style.left=y+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1200)}

const confettiCanvas=document.getElementById('confetti');const confCtx=confettiCanvas.getContext('2d');let particles=[];
function resizeConf(){confettiCanvas.width=window.innerWidth;confettiCanvas.height=window.innerHeight}
window.addEventListener('resize',resizeConf);resizeConf();
function spawnConfetti(n=12){const colors=['#8b5cf6','#c084fc','#22c55e','#f59e0b','#f43f5e'];for(let i=0;i<n;i++){particles.push({x:Math.random()*confettiCanvas.width,y:confettiCanvas.height+10,vx:(Math.random()-0.5)*8,vy:-Math.random()*12-4,size:Math.random()*6+3,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rotS:(Math.random()-0.5)*10,life:1})}}
function animConf(){confCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.rot+=p.rotS;p.life-=0.015;if(p.life<=0)return false;confCtx.save();confCtx.translate(p.x,p.y);confCtx.rotate(p.rot*Math.PI/180);confCtx.fillStyle=p.color;confCtx.globalAlpha=p.life;confCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);confCtx.restore();return true});if(particles.length)requestAnimationFrame(animConf)}

function checkDayProgress(){
  const today=getToday();const saved=data.plans[today];
  if(saved&&saved.completed){completedCount=saved.completed.length;updateDash()}
}

function resetAll(){
  data={plans:{},profile:null,streak:0,lastDay:null,totalXP:0};saveData(data);
  document.getElementById('schedule-view').style.display='none';
  document.getElementById('chat-container').style.display='flex';
  document.getElementById('streak-card').classList.remove('show');
  chatStep=0;chatInputs={};runOnboarding();
}

// Start
runOnboarding();
