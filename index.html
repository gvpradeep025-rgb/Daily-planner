<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Goal Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e0e0e0;
    --muted: #8888aa;
    --border: #2a2a4a;
    --success: #00c9a7;
    --warning: #ffc107;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 30px 0 20px;
  }

  header h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-top: 24px;
  }

  .setup-card h2 {
    font-size: 1.1rem;
    margin-bottom: 18px;
    color: var(--accent);
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 14px;
  }

  label:first-of-type { margin-top: 0; }

  input, select, textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #12121f;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; font-family: inherit; }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .goals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 6px;
  }

  .goal-chip {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #12121f;
    cursor: pointer;
    font-size: 0.85rem;
    text-align: center;
    transition: all 0.2s;
    user-select: none;
  }

  .goal-chip:hover { border-color: var(--accent); }
  .goal-chip.selected {
    border-color: var(--accent);
    background: rgba(108, 99, 255, 0.15);
    color: var(--accent);
    font-weight: 600;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 22px;
    width: 100%;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 10px;
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  /* Schedule Display */
  #schedule-view { display: none; }

  .schedule-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .schedule-header h2 {
    font-size: 1.2rem;
    color: var(--accent);
  }

  .tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(108, 99, 255, 0.15);
    color: var(--accent);
  }

  .timeline {
    position: relative;
    padding-left: 28px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  .time-block {
    position: relative;
    margin-bottom: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: all 0.2s;
    cursor: default;
  }

  .time-block:hover { border-color: var(--accent); transform: translateX(4px); }

  .time-block::before {
    content: '';
    position: absolute;
    left: -24px;
    top: 18px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
  }

  .time-block.active::before { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .time-block.done::before { background: var(--muted); }

  .block-time {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .block-title {
    font-size: 0.95rem;
    font-weight: 600;
    margin: 4px 0 2px;
  }

  .block-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .block-icon {
    position: absolute;
    right: 14px;
    top: 14px;
    font-size: 1.2rem;
  }

  .check-btn {
    position: absolute;
    right: 14px;
    bottom: 12px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 0.7rem;
    color: transparent;
  }

  .check-btn:hover { border-color: var(--success); }
  .check-btn.checked {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  .progress-section {
    margin-top: 20px;
    padding: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .progress-section h3 {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .progress-bar-bg {
    width: 100%;
    height: 8px;
    background: #12121f;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  .motivational {
    text-align: center;
    margin-top: 20px;
    padding: 18px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(255,101,132,0.1));
    border: 1px solid var(--border);
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  @media (max-width: 500px) {
    .time-row, .goals-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Daily Goal Planner</h1>
    <p>Set your goal, and I'll plan your entire day</p>
  </header>

  <!-- Setup Form -->
  <div id="setup-view">
    <div class="setup-card">
      <h2>What's your goal?</h2>

      <label>Main Goal</label>
      <select id="goal-type">
        <option value="">Select a goal category...</option>
        <option value="fitness">Lose Weight / Get Fit</option>
        <option value="study">Study / Learn Something New</option>
        <option value="coding">Build a Coding Project</option>
        <option value="business">Start a Side Business</option>
        <option value="productivity">Be More Productive</option>
        <option value="mental">Improve Mental Health</option>
        <option value="creative">Creative Project (Art, Music, Writing)</option>
        <option value="exams">Prepare for Exams / Certification</option>
        <option value="language">Learn a New Language</option>
        <option value="music">Learn an Instrument</option>
        <option value="freelance">Build a Freelance Career</option>
        <option value="content">Content Creation / YouTube / Blog</option>
        <option value="social">Improve Social Life</option>
        <option value="sleep">Fix Sleep Schedule</option>
        <option value="custom">Custom Goal</option>
      </select>

      <label>Describe what you want to achieve (this shapes your schedule)</label>
      <textarea id="custom-goal" placeholder="e.g. Learn piano in 3 months, lose 10kg by December, pass AWS certification, build a SaaS app..."></textarea>

      <label>Your Wake-Up Time</label>
      <div class="time-row">
        <input type="time" id="wake-time" value="06:00">
      </div>

      <label>Bedtime</label>
      <div class="time-row">
        <input type="time" id="bed-time" value="22:30">
      </div>

      <label>Work / Commitment Hours (if any)</label>
      <div class="time-row">
        <input type="time" id="work-start" placeholder="Start">
        <input type="time" id="work-end" placeholder="End">
      </div>

      <label>Notes & Preferences</label>
      <textarea id="notes" placeholder="e.g. I prefer working out in the morning, I have a 9-5 job, I learn best at night, I want at least 1 hour of free time..."></textarea>

      <button class="btn btn-primary" onclick="generateSchedule()">Generate My Day</button>
    </div>
  </div>

  <!-- Schedule View -->
  <div id="schedule-view">
    <div class="schedule-header">
      <h2 id="schedule-title">Your Day</h2>
      <div>
        <span class="tag" id="goal-tag"></span>
      </div>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="progress-section">
      <h3>Today's Progress</h3>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0 / 0 completed</div>
    </div>

    <div class="motivational" id="quote"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Upcoming</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div>Current</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div>Done</div>
    </div>

    <button class="btn btn-secondary" onclick="resetForm()">Edit Settings</button>
  </div>
</div>

<script>
const priorityChips = document.querySelectorAll('.goal-chip');
const priorities = new Set();

priorityChips.forEach(chip => {
  chip.addEventListener('click', () => {
    const val = chip.dataset.val;
    if (priorities.has(val)) {
      priorities.delete(val);
      chip.classList.remove('selected');
    } else {
      priorities.add(val);
      chip.classList.add('selected');
    }
  });
});

const quotes = [
  "The secret of getting ahead is getting started. — Mark Twain",
  "Small daily improvements are the key to staggering long-term results.",
  "You don't have to be extreme, just consistent.",
  "Discipline is choosing between what you want now and what you want most.",
  "A year from now you'll wish you had started today.",
  "The only bad workout is the one that didn't happen.",
  "Progress, not perfection.",
  "What you do every day matters more than what you do once in a while.",
  "Start where you are. Use what you have. Do what you can.",
  "Your future self will thank you."
];

function randomQuote() {
  return quotes[Math.floor(Math.random() * quotes.length)];
}

function timeToMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function minToTime(m) {
  const h = Math.floor(m / 60) % 24;
  const mm = m % 60;
  return `${String(h).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
}

function formatTime12(t) {
  let [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
}

function parseNotes(notes) {
  const lower = notes.toLowerCase();
  return {
    morningWorkout: /morning|early|first thing|before work|am workout/.test(lower),
    eveningWorkout: /evening|after work|night|pm workout|later/.test(lower),
    hasWorkHours: /\b(9-5|9 to 5|work|job|office|shift|class)\b/.test(lower),
    prefersShortBreaks: /short break|quick break|pomodoro/.test(lower),
    prefersLongBreaks: /long break|rest more|relax/.test(lower),
    wantsMeditation: /meditat|mindful|yoga|breathe|calm/.test(lower),
    wantsReading: /read|book|library/.test(lower),
    wantsExercise: /gym|exercise|workout|run|cardio|strength|lift/.test(lower),
    wantsFreeTime: /free time|fun|hobby|game|relax|chill/.test(lower),
    wantsLearning: /learn|course|tutorial|study|read/.test(lower),
    wantsSocial: /friend|social|call|hangout|family|people/.test(lower),
    nightOwl: /night|late|owl|nightow/.test(lower),
    earlyBird: /early|morning person|dawn/.test(lower)
  };
}

function parseGoalDesc(desc) {
  const lower = (desc || '').toLowerCase();
  return {
    text: desc || '',
    isFitness: /lose weight|fit|gym|muscle|fat|cardio|strength|body|exercise|workout|run|swim|yoga/.test(lower),
    isStudy: /study|learn|exam|course|tutorial|read|book|class|school|university|college/.test(lower),
    isCoding: /code|program|app|software|website|build|develop|api|database|frontend|backend/.test(lower),
    isBusiness: /business|startup|revenue|customer|sell|marketing|brand|profit|freelance|client/.test(lower),
    isCreative: /art|music|write|novel|song|paint|draw|design|film|photo|creative|compose/.test(lower),
    isLanguage: /language|spanish|french|german|japanese|chinese|korean|english|hindi|speak/.test(lower),
    isInstrument: /piano|guitar|violin|drum|flute|instrument|music|chord|melody/.test(lower),
    hasDeadline: /deadline|by \w+|\d+ (week|month|day|year)/.test(lower)
  };
}

function buildSchedule() {
  const goalType = document.getElementById('goal-type').value;
  if (!goalType) { alert('Please select a goal category!'); return; }

  const goalDesc = document.getElementById('custom-goal').value;
  const wakeTime = document.getElementById('wake-time').value;
  const bedTime = document.getElementById('bed-time').value;
  const workStart = document.getElementById('work-start').value;
  const workEnd = document.getElementById('work-end').value;
  const notes = document.getElementById('notes').value;

  const wakeMin = timeToMin(wakeTime);
  const bedMin = timeToMin(bedTime) > wakeMin ? timeToMin(bedTime) : timeToMin(bedTime) + 1440;
  const totalMinutes = bedMin - wakeMin;

  const notePrefs = parseNotes(notes);
  const goalInfo = parseGoalDesc(goalDesc);

  const hasWorkBlock = workStart && workEnd;
  const workStartMin = hasWorkBlock ? timeToMin(workStart) : null;
  const workEndMin = hasWorkBlock ? timeToMin(workEnd) : null;

  const goalLabel = goalDesc || document.getElementById('goal-type').options[document.getElementById('goal-type').selectedIndex].text;

  let blocks = [];

  if (notePrefs.earlyBird) {
    blocks.push({ rel: 0, dur: 5, title: 'Early Rise', desc: 'Up before the world. Drink water.', icon: '🌅' });
    blocks.push({ rel: 5, dur: 15, title: 'Morning Silence', desc: 'No phone. Just breathe and be present.', icon: '🧘' });
  } else if (notePrefs.nightOwl) {
    blocks.push({ rel: 0, dur: 10, title: 'Gentle Wake', desc: 'Ease into it. Hydrate, no rush.', icon: '☀️' });
  } else {
    blocks.push({ rel: 0, dur: 5, title: 'Hydrate', desc: 'Drink a glass of water first thing.', icon: '💧' });
    blocks.push({ rel: 5, dur: 15, title: 'Morning Routine', desc: 'Freshen up, quick breakfast.', icon: '☀️' });
  }

  if (notePrefs.wantsMeditation) {
    blocks.push({ rel: 20, dur: 15, title: 'Meditation', desc: 'Sit quietly, focus on breath. 10-15 min.', icon: '🧘' });
  }

  blocks.push({ rel: blocks.length > 2 ? 35 : 20, dur: 10, title: 'Plan Your Day', desc: 'Set 3 priorities. Visualize success.', icon: '📋' });

  if (goalInfo.isFitness || goalType === 'fitness') {
    if (notePrefs.morningWorkout || !notePrefs.eveningWorkout) {
      blocks.push({ rel: 45, dur: 45, title: 'Morning Workout', desc: goalDesc ? `Train for: ${goalDesc}` : 'Cardio + strength. Push yourself.', icon: '💪' });
      blocks.push({ rel: 90, dur: 20, title: 'Post-Workout Meal', desc: 'Protein-rich breakfast. Fuel recovery.', icon: '🍳' });
    } else {
      blocks.push({ rel: 45, dur: 20, title: 'Light Morning Stretch', desc: 'Wake up the body gently.', icon: '🧘' });
    }
  } else if (goalInfo.isCoding || goalType === 'coding') {
    blocks.push({ rel: 45, dur: 90, title: 'Deep Coding Block', desc: goalDesc ? `Build: ${goalDesc}` : 'Focus mode. Build the hardest feature.', icon: '💻' });
    blocks.push({ rel: 135, dur: 10, title: 'Break', desc: 'Rest your eyes. Stand up.', icon: '👁️' });
    blocks.push({ rel: 145, dur: 90, title: 'Coding Block 2', desc: 'Debug, test, iterate.', icon: '🐛' });
  } else if (goalInfo.isStudy || goalType === 'study' || goalType === 'exams') {
    blocks.push({ rel: 45, dur: 60, title: 'Deep Study Session', desc: goalDesc ? `Study: ${goalDesc}` : 'Active recall + practice problems.', icon: '🧠' });
    blocks.push({ rel: 105, dur: 10, title: 'Break', desc: 'Walk, hydrate.', icon: '🚶' });
    blocks.push({ rel: 115, dur: 60, title: 'Study Session 2', desc: 'Flashcards, notes, review.', icon: '📝' });
  } else if (goalInfo.isLanguage || goalType === 'language') {
    blocks.push({ rel: 45, dur: 30, title: 'Vocabulary Drills', desc: goalDesc ? `Practice: ${goalDesc}` : 'Flashcards, Anki, word lists.', icon: '📇' });
    blocks.push({ rel: 75, dur: 30, title: 'Grammar & Structure', desc: 'Textbook, exercises, patterns.', icon: '📖' });
    blocks.push({ rel: 105, dur: 30, title: 'Listening Practice', desc: 'Podcasts, shows, music in target language.', icon: '🎧' });
    blocks.push({ rel: 135, dur: 20, title: 'Speaking Practice', desc: 'Talk to yourself, shadowing, or language partner.', icon: '🗣️' });
  } else if (goalInfo.isInstrument || goalType === 'music') {
    blocks.push({ rel: 45, dur: 30, title: 'Technique Drills', desc: goalDesc ? `Practice: ${goalDesc}` : 'Scales, chords, finger exercises.', icon: '🎯' });
    blocks.push({ rel: 75, dur: 30, title: 'Song Practice', desc: 'Work on a specific piece or song.', icon: '🎵' });
    blocks.push({ rel: 105, dur: 20, title: 'Theory & Ear Training', desc: 'Interval recognition, chord progressions.', icon: '🎼' });
  } else if (goalInfo.isCreative || goalType === 'creative') {
    blocks.push({ rel: 45, dur: 60, title: 'Creative Work', desc: goalDesc ? `Create: ${goalDesc}` : 'Deep focus on your creative project.', icon: '🎨' });
    blocks.push({ rel: 105, dur: 10, title: 'Break', desc: 'Let ideas simmer.', icon: '🚶' });
    blocks.push({ rel: 115, dur: 60, title: 'Continue Creating', desc: 'Refine, iterate, experiment.', icon: '🔧' });
  } else if (goalInfo.isBusiness || goalType === 'business' || goalType === 'freelance') {
    blocks.push({ rel: 45, dur: 60, title: 'Revenue Activity', desc: goalDesc ? `Work on: ${goalDesc}` : 'Sales, outreach, content.', icon: '💰' });
    blocks.push({ rel: 105, dur: 10, title: 'Break', desc: 'Stretch, hydrate.', icon: '🚶' });
    blocks.push({ rel: 115, dur: 60, title: 'Build & Create', desc: 'Product, service, or content.', icon: '🛠️' });
  } else if (goalType === 'content') {
    blocks.push({ rel: 45, dur: 60, title: 'Content Creation', desc: goalDesc ? `Create: ${goalDesc}` : 'Write, film, or design content.', icon: '📱' });
    blocks.push({ rel: 105, dur: 10, title: 'Break', desc: 'Step away.', icon: '🚶' });
    blocks.push({ rel: 115, dur: 60, title: 'Editing & Publishing', desc: 'Polish and post your content.', icon: '🎬' });
  } else if (goalType === 'social') {
    blocks.push({ rel: 45, dur: 30, title: 'Social Skill Building', desc: 'Practice conversation, read about body language.', icon: '💬' });
    blocks.push({ rel: 75, dur: 60, title: 'Outreach', desc: 'Message friends, make plans, connect.', icon: '🤝' });
  } else if (goalType === 'sleep') {
    blocks.push({ rel: 45, dur: 30, title: 'Light Activity', desc: 'Gentle movement, no screens soon.', icon: '🧘' });
  } else {
    blocks.push({ rel: 45, dur: 60, title: 'Focus Block 1', desc: goalDesc ? `Work on: ${goalDesc}` : 'Deep work on your main goal.', icon: '🎯' });
    blocks.push({ rel: 105, dur: 10, title: 'Break', desc: 'Stretch, hydrate.', icon: '🚶' });
    blocks.push({ rel: 115, dur: 60, title: 'Focus Block 2', desc: 'Continue or tackle secondary tasks.', icon: '⚡' });
  }

  if (hasWorkBlock) {
    const wsRel = workStartMin - wakeMin;
    const weRel = workEndMin - wakeMin;
    blocks.push({ rel: wsRel, dur: weRel - wsRel, title: 'Work / Commitment', desc: `Your scheduled block: ${formatTime12(workStart)} - ${formatTime12(workEnd)}`, icon: '💼' });
  }

  if (notePrefs.wantsExercise && !goalInfo.isFitness && goalType !== 'fitness') {
    const exerciseTime = notePrefs.morningWorkout ? 50 : (notePrefs.eveningWorkout ? totalMinutes - 120 : totalMinutes - 180);
    blocks.push({ rel: Math.max(exerciseTime, 60), dur: 30, title: 'Exercise', desc: 'Move your body. Walk, gym, stretch.', icon: '🏋️' });
  }

  if (notePrefs.wantsLearning && !goalInfo.isStudy && goalType !== 'study') {
    blocks.push({ rel: totalMinutes - 180, dur: 40, title: 'Learning Time', desc: 'Read, watch tutorials, grow.', icon: '📚' });
  }

  if (notePrefs.wantsReading) {
    blocks.push({ rel: totalMinutes - 90, dur: 30, title: 'Reading', desc: 'Read a book or article.', icon: '📖' });
  }

  if (notePrefs.wantsSocial) {
    blocks.push({ rel: totalMinutes - 150, dur: 30, title: 'Social Time', desc: 'Call a friend, be with people.', icon: '💬' });
  }

  blocks.push({ rel: totalMinutes - 120, dur: 30, title: 'Lunch', desc: 'Eat a balanced meal. Step away from screens.', icon: '🍽️' });

  if (notePrefs.morningWorkout && (goalInfo.isFitness || goalType === 'fitness')) {
    blocks.push({ rel: totalMinutes - 100, dur: 30, title: 'Evening Stretch', desc: 'Light yoga or mobility work.', icon: '🧘' });
  } else if (notePrefs.eveningWorkout || (!notePrefs.morningWorkout && (goalInfo.isFitness || goalType === 'fitness'))) {
    blocks.push({ rel: totalMinutes - 100, dur: 45, title: 'Workout', desc: goalDesc ? `Train for: ${goalDesc}` : 'Cardio, strength, or sport.', icon: '💪' });
  }

  if (notePrefs.wantsFreeTime) {
    blocks.push({ rel: totalMinutes - 60, dur: 30, title: 'Free Time', desc: 'Do whatever you enjoy. Decompress.', icon: '🎮' });
  }

  if (notePrefs.nightOwl) {
    blocks.push({ rel: totalMinutes - 30, dur: 15, title: 'Wind Down', desc: 'Dim lights, no screens, read.', icon: '📖' });
    blocks.push({ rel: totalMinutes - 15, dur: 15, title: 'Sleep', desc: 'Rest and recover.', icon: '🌙' });
  } else {
    blocks.push({ rel: totalMinutes - 40, dur: 15, title: 'Review Day', desc: 'What got done? What\'s tomorrow?', icon: '📝' });
    blocks.push({ rel: totalMinutes - 25, dur: 15, title: 'Wind Down', desc: 'No screens. Breathe.', icon: '📖' });
    blocks.push({ rel: totalMinutes - 10, dur: 10, title: 'Sleep', desc: 'Lights out. You earned this.', icon: '🌙' });
  }

  blocks.sort((a, b) => a.rel - b.rel);

  const merged = [];
  for (const b of blocks) {
    if (merged.length > 0) {
      const last = merged[merged.length - 1];
      const lastEnd = last.rel + last.dur;
      if (b.rel < lastEnd) {
        last.dur = Math.max(last.dur, (b.rel + b.dur) - last.rel);
        continue;
      }
    }
    merged.push({ ...b });
  }

  return merged;
}

function generateSchedule() {
  const blocks = buildSchedule();
  const goalType = document.getElementById('goal-type').value;
  const goalDesc = document.getElementById('custom-goal').value;
  const wakeTime = document.getElementById('wake-time').value;
  const bedTime = document.getElementById('bed-time').value;

  const wakeMin = timeToMin(wakeTime);
  const bedMin = timeToMin(bedTime) > wakeMin ? timeToMin(bedTime) : timeToMin(bedTime) + 1440;

  const goalLabel = goalDesc || document.getElementById('goal-type').options[document.getElementById('goal-type').selectedIndex].text;

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  const now = new Date();
  const currentMin = now.getHours() * 60 + now.getMinutes();

  blocks.forEach((item, i) => {
    const absStart = wakeMin + item.rel;
    const absEnd = wakeMin + item.rel + item.dur;

    if (absEnd > bedMin + 30) return;

    const block = document.createElement('div');
    block.className = 'time-block';

    if (currentMin >= absEnd) block.classList.add('done');
    else if (currentMin >= absStart && currentMin < absEnd) block.classList.add('active');

    block.innerHTML = `
      <div class="block-time">${formatTime12(minToTime(absStart % 1440))} — ${formatTime12(minToTime(absEnd % 1440))}</div>
      <div class="block-title">${item.title}</div>
      <div class="block-desc">${item.desc}</div>
      <div class="block-icon">${item.icon}</div>
      <button class="check-btn ${currentMin >= absEnd ? 'checked' : ''}" onclick="toggleCheck(this)">✓</button>
    `;

    timeline.appendChild(block);
  });

  document.getElementById('goal-tag').textContent = goalLabel;
  document.getElementById('schedule-title').textContent = 'Your Day';
  document.getElementById('quote').textContent = randomQuote();

  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('schedule-view').style.display = 'block';

  updateProgress();
}

function toggleCheck(btn) {
  btn.classList.toggle('checked');
  const block = btn.closest('.time-block');
  if (btn.classList.contains('checked')) {
    block.classList.add('done');
    block.classList.remove('active');
  } else {
    block.classList.remove('done');
  }
  updateProgress();
}

function updateProgress() {
  const total = document.querySelectorAll('.check-btn').length;
  const checked = document.querySelectorAll('.check-btn.checked').length;
  const pct = total ? (checked / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${checked} / ${total} completed`;
}

function resetForm() {
  document.getElementById('setup-view').style.display = 'block';
  document.getElementById('schedule-view').style.display = 'none';
}
</script>
