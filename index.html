<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Goal Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e0e0e0;
    --muted: #8888aa;
    --border: #2a2a4a;
    --success: #00c9a7;
    --warning: #ffc107;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 30px 0 20px;
  }

  header h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-top: 24px;
  }

  .setup-card h2 {
    font-size: 1.1rem;
    margin-bottom: 18px;
    color: var(--accent);
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 14px;
  }

  label:first-of-type { margin-top: 0; }

  input, select, textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #12121f;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; font-family: inherit; }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .goals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 6px;
  }

  .goal-chip {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #12121f;
    cursor: pointer;
    font-size: 0.85rem;
    text-align: center;
    transition: all 0.2s;
    user-select: none;
  }

  .goal-chip:hover { border-color: var(--accent); }
  .goal-chip.selected {
    border-color: var(--accent);
    background: rgba(108, 99, 255, 0.15);
    color: var(--accent);
    font-weight: 600;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 22px;
    width: 100%;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 10px;
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  /* Schedule Display */
  #schedule-view { display: none; }

  .schedule-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .schedule-header h2 {
    font-size: 1.2rem;
    color: var(--accent);
  }

  .tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(108, 99, 255, 0.15);
    color: var(--accent);
  }

  .timeline {
    position: relative;
    padding-left: 28px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  .time-block {
    position: relative;
    margin-bottom: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: all 0.2s;
    cursor: default;
  }

  .time-block:hover { border-color: var(--accent); transform: translateX(4px); }

  .time-block::before {
    content: '';
    position: absolute;
    left: -24px;
    top: 18px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
  }

  .time-block.active::before { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .time-block.done::before { background: var(--muted); }

  .block-time {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .block-title {
    font-size: 0.95rem;
    font-weight: 600;
    margin: 4px 0 2px;
  }

  .block-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .block-icon {
    position: absolute;
    right: 14px;
    top: 14px;
    font-size: 1.2rem;
  }

  .check-btn {
    position: absolute;
    right: 14px;
    bottom: 12px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 0.7rem;
    color: transparent;
  }

  .check-btn:hover { border-color: var(--success); }
  .check-btn.checked {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  .progress-section {
    margin-top: 20px;
    padding: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .progress-section h3 {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .progress-bar-bg {
    width: 100%;
    height: 8px;
    background: #12121f;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  .motivational {
    text-align: center;
    margin-top: 20px;
    padding: 18px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(255,101,132,0.1));
    border: 1px solid var(--border);
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  @media (max-width: 500px) {
    .time-row, .goals-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Daily Goal Planner</h1>
    <p>Set your goal, and I'll plan your entire day</p>
  </header>

  <!-- Setup Form -->
  <div id="setup-view">
    <div class="setup-card">
      <h2>What's your goal?</h2>

      <label>Main Goal</label>
      <select id="goal-type">
        <option value="">Select a goal category...</option>
        <option value="fitness">Lose Weight / Get Fit</option>
        <option value="study">Study / Learn Something New</option>
        <option value="coding">Build a Coding Project</option>
        <option value="business">Start a Side Business</option>
        <option value="productivity">Be More Productive</option>
        <option value="mental">Improve Mental Health</option>
        <option value="creative">Creative Project (Art, Music, Writing)</option>
        <option value="exams">Prepare for Exams / Certification</option>
        <option value="language">Learn a New Language</option>
        <option value="music">Learn an Instrument</option>
        <option value="freelance">Build a Freelance Career</option>
        <option value="content">Content Creation / YouTube / Blog</option>
        <option value="social">Improve Social Life</option>
        <option value="sleep">Fix Sleep Schedule</option>
        <option value="custom">Custom Goal</option>
      </select>

      <label>Describe what you want to achieve (this shapes your schedule)</label>
      <textarea id="custom-goal" placeholder="e.g. Learn piano in 3 months, lose 10kg by December, pass AWS certification, build a SaaS app..."></textarea>

      <label>Your Wake-Up Time</label>
      <div class="time-row">
        <input type="time" id="wake-time" value="06:00">
      </div>

      <label>Bedtime</label>
      <div class="time-row">
        <input type="time" id="bed-time" value="22:30">
      </div>

      <label>Work / Commitment Hours (if any)</label>
      <div class="time-row">
        <input type="time" id="work-start" placeholder="Start">
        <input type="time" id="work-end" placeholder="End">
      </div>

      <label>Notes & Preferences</label>
      <textarea id="notes" placeholder="e.g. I prefer working out in the morning, I have a 9-5 job, I learn best at night, I want at least 1 hour of free time..."></textarea>

      <button class="btn btn-primary" onclick="generateSchedule()">Generate My Day</button>
    </div>
  </div>

  <!-- Schedule View -->
  <div id="schedule-view">
    <div class="schedule-header">
      <h2 id="schedule-title">Your Day</h2>
      <div>
        <span class="tag" id="goal-tag"></span>
      </div>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="progress-section">
      <h3>Today's Progress</h3>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0 / 0 completed</div>
    </div>

    <div class="motivational" id="quote"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Upcoming</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div>Current</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div>Done</div>
    </div>

    <button class="btn btn-secondary" onclick="resetForm()">Edit Settings</button>
  </div>
</div>

<script>
const priorityChips = document.querySelectorAll('.goal-chip');
const priorities = new Set();

priorityChips.forEach(chip => {
  chip.addEventListener('click', () => {
    const val = chip.dataset.val;
    if (priorities.has(val)) {
      priorities.delete(val);
      chip.classList.remove('selected');
    } else {
      priorities.add(val);
      chip.classList.add('selected');
    }
  });
});

const quotes = [
  "The secret of getting ahead is getting started. — Mark Twain",
  "Small daily improvements are the key to staggering long-term results.",
  "You don't have to be extreme, just consistent.",
  "Discipline is choosing between what you want now and what you want most.",
  "A year from now you'll wish you had started today.",
  "The only bad workout is the one that didn't happen.",
  "Progress, not perfection.",
  "What you do every day matters more than what you do once in a while.",
  "Start where you are. Use what you have. Do what you can.",
  "Your future self will thank you."
];

function randomQuote() {
  return quotes[Math.floor(Math.random() * quotes.length)];
}

function timeToMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function minToTime(m) {
  const h = Math.floor(((m % 1440) + 1440) % 1440 / 60);
  const mm = ((m % 1440) + 1440) % 1440 % 60;
  return `${String(h).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
}

function formatTime12(t) {
  let [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
}

function parseNotes(notes) {
  const l = notes.toLowerCase();
  return {
    morningWorkout: /morning|early|first thing|before work|am workout/.test(l),
    eveningWorkout: /evening|after work|night|pm workout|later/.test(l),
    wantsMeditation: /meditat|mindful|yoga|breathe|calm|prayer/.test(l),
    wantsReading: /read|book|library/.test(l),
    wantsExercise: /gym|exercise|workout|run|cardio|strength|lift|walk/.test(l),
    wantsFreeTime: /free time|fun|hobby|game|relax|chill|leisure/.test(l),
    wantsLearning: /learn|course|tutorial|grow/.test(l),
    wantsSocial: /friend|social|call|hangout|family|people|party/.test(l),
    wantsCooking: /cook|meal prep|kitchen/.test(l),
    wantsJournal: /journal|write|reflect|diary/.test(l),
    nightOwl: /night owl|late|nightow|night person/.test(l),
    earlyBird: /early|morning person|dawn/.test(l)
  };
}

function parseGoalDesc(desc) {
  const l = (desc || '').toLowerCase();
  return {
    text: desc || '',
    isFitness: /lose weight|fit|gym|muscle|fat|cardio|strength|body|exercise|workout|run|swim|yoga|abs|chest|legs|bulk|cut|10kg|weight/.test(l),
    isStudy: /study|learn|exam|course|tutorial|read|book|class|school|university|college|gate|upsc|neet|jee|sat|gre|gmat/.test(l),
    isCoding: /code|program|app|software|website|build|develop|api|database|frontend|backend|javascript|python|react|node/.test(l),
    isBusiness: /business|startup|revenue|customer|sell|marketing|brand|profit|freelance|client|saas|agency/.test(l),
    isCreative: /art|music|write|novel|song|paint|draw|design|film|photo|creative|compose|youtube|blog|content/.test(l),
    isLanguage: /language|spanish|french|german|japanese|chinese|korean|english|hindi|speak|fluent/.test(l),
    isInstrument: /piano|guitar|violin|drum|flute|instrument|ukulele|keyboard|chord|melody/.test(l),
    hasDeadline: /deadline|by \w+|\d+ (week|month|day|year)/.test(l),
    specificTask: desc || ''
  };
}

function buildSchedule() {
  const goalType = document.getElementById('goal-type').value;
  if (!goalType) { alert('Please select a goal category!'); return null; }

  const goalDesc = document.getElementById('custom-goal').value;
  const wakeTime = document.getElementById('wake-time').value;
  const bedTime = document.getElementById('bed-time').value;
  const workStart = document.getElementById('work-start').value;
  const workEnd = document.getElementById('work-end').value;
  const notes = document.getElementById('notes').value;

  const wake = timeToMin(wakeTime);
  const bed = timeToMin(bedTime) > wake ? timeToMin(bedTime) : timeToMin(bedTime) + 1440;
  const notePrefs = parseNotes(notes);
  const goalInfo = parseGoalDesc(goalDesc);
  const hasWorkBlock = workStart && workEnd;
  const workS = hasWorkBlock ? timeToMin(workStart) : null;
  const workE = hasWorkBlock ? timeToMin(workEnd) : null;

  let blocks = [];

  function add(startMin, durMin, title, desc, icon) {
    blocks.push({ start: startMin, dur: durMin, title, desc, icon });
  }

  // === MORNING BLOCKS ===
  if (notePrefs.earlyBird) {
    add(wake, 5, 'Early Rise', 'Up before the world. Hydrate.', '🌅');
    add(wake + 5, 15, 'Morning Silence', 'No phone. Breathe. Be present.', '🧘');
  } else if (notePrefs.nightOwl) {
    add(wake, 10, 'Gentle Wake', 'No rush. Hydrate, get oriented.', '☀️');
  } else {
    add(wake, 5, 'Hydrate', 'Glass of water. Wake up your body.', '💧');
    add(wake + 5, 15, 'Morning Routine', 'Freshen up, brush, get ready.', '☀️');
  }

  const afterMorning = wake + 20;

  if (notePrefs.wantsMeditation) {
    add(afterMorning, 15, 'Meditation', 'Sit quietly. Focus on breath.', '🧘');
  }

  if (notePrefs.wantsJournal) {
    add(afterMorning + (notePrefs.wantsMeditation ? 15 : 0), 10, 'Journaling', 'Write thoughts, goals, gratitude.', '📝');
  }

  // === BREAKFAST ===
  const breakfastTime = afterMorning + (notePrefs.wantsMeditation ? 15 : 0) + (notePrefs.wantsJournal ? 10 : 0);
  add(breakfastTime, 20, 'Breakfast', 'Eat a proper meal. Fuel your day.', '🍳');

  // === WORKOUT (morning preference or fitness goal) ===
  const afterBreakfast = breakfastTime + 20;
  const isFitnessGoal = goalInfo.isFitness || goalType === 'fitness';
  const wantsWorkout = notePrefs.wantsExercise || isFitnessGoal;

  if (wantsWorkout && (notePrefs.morningWorkout || (!notePrefs.eveningWorkout && isFitnessGoal))) {
    add(afterBreakfast, 45, 'Workout', goalDesc ? `Train for: ${goalDesc}` : 'Cardio + strength. Push yourself.', '💪');
    add(afterBreakfast + 45, 15, 'Post-Workout Snack', 'Protein shake or light snack.', '🥤');
  }

  // === MORNING GOAL WORK ===
  const goalWorkStart = afterBreakfast + (wantsWorkout && (notePrefs.morningWorkout || (!notePrefs.eveningWorkout && isFitnessGoal)) ? 60 : 0);

  if (hasWorkBlock && workS > goalWorkStart) {
    const availableBeforeWork = workS - goalWorkStart;
    if (availableBeforeWork >= 30) {
      const goalBlocks = getGoalBlocks(goalType, goalInfo, goalDesc, notePrefs, 'morning');
      goalBlocks.forEach((g, i) => {
        add(goalWorkStart + (i * g.dur), g.dur, g.title, g.desc, g.icon);
      });
    }
  } else if (!hasWorkBlock) {
    const goalBlocks = getGoalBlocks(goalType, goalInfo, goalDesc, notePrefs, 'morning');
    goalBlocks.forEach((g, i) => {
      add(goalWorkStart + (i * g.dur), g.dur, g.title, g.desc, g.icon);
    });
  }

  // === WORK BLOCK ===
  if (hasWorkBlock) {
    add(workS, workE - workS, 'Work / Commitment', `Your block: ${formatTime12(workStart)} - ${formatTime12(workEnd)}`, '💼');
  }

  // === LUNCH (fixed at 12:00-12:30 or 1 hour after work starts if work hours overlap) ===
  let lunchTime;
  if (hasWorkBlock && workS >= timeToMin('11:00') && workS <= timeToMin('13:00')) {
    lunchTime = workS + Math.min((workE - workS) / 2, 120);
  } else {
    lunchTime = Math.max(timeToMin('12:00'), wake + 300);
  }
  if (lunchTime < wake) lunchTime += 1440;
  add(lunchTime, 30, 'Lunch', 'Balanced meal. Step away from screens.', '🍽️');

  // === AFTERNOON GOAL WORK ===
  const afternoonStart = lunchTime + 30;
  if (!hasWorkBlock || workE <= afternoonStart) {
    const goalBlocks = getGoalBlocks(goalType, goalInfo, goalDesc, notePrefs, 'afternoon');
    goalBlocks.forEach((g, i) => {
      add(afternoonStart + (i * g.dur), g.dur, g.title, g.desc, g.icon);
    });
  } else if (hasWorkBlock && workE > afternoonStart) {
    const afterWork = workE;
    const goalBlocks = getGoalBlocks(goalType, goalInfo, goalDesc, notePrefs, 'afternoon');
    goalBlocks.forEach((g, i) => {
      add(afterWork + (i * g.dur), g.dur, g.title, g.desc, g.icon);
    });
  }

  // === EVENING WORKOUT (if preferred) ===
  const eveningBase = hasWorkBlock ? workE : afternoonStart + 120;
  if (wantsWorkout && notePrefs.eveningWorkout) {
    add(eveningBase, 45, 'Workout', goalDesc ? `Train for: ${goalDesc}` : 'Cardio, strength, or sport.', '💪');
  }

  // === DINNER (fixed around 7-8pm or 30min after evening workout) ===
  let dinnerTime;
  if (wantsWorkout && notePrefs.eveningWorkout) {
    dinnerTime = eveningBase + 45;
  } else {
    dinnerTime = Math.max(timeToMin('19:00'), eveningBase);
  }
  if (dinnerTime < wake) dinnerTime += 1440;
  add(dinnerTime, 30, 'Dinner', 'Nourishing meal. Eat slowly.', '🍽️');

  // === EXTRA BLOCKS BASED ON NOTES ===
  const postDinner = dinnerTime + 30;

  if (notePrefs.wantsLearning && !goalInfo.isStudy && goalType !== 'study' && goalType !== 'exams') {
    add(postDinner, 40, 'Learning Time', 'Watch tutorials, read, grow.', '📚');
  }

  if (notePrefs.wantsSocial) {
    add(postDinner, 30, 'Social Time', 'Call a friend, be with people.', '💬');
  }

  if (notePrefs.wantsFreeTime) {
    add(postDinner, 30, 'Free Time', 'Do whatever you enjoy. Decompress.', '🎮');
  }

  if (notePrefs.wantsReading) {
    add(postDinner, 30, 'Reading', 'Read a book or article.', '📖');
  }

  if (notePrefs.wantsCooking) {
    add(postDinner, 30, 'Meal Prep', 'Prepare meals for tomorrow.', '👨‍🍳');
  }

  // === WIND DOWN ===
  const windDown = bed - 40;
  add(windDown, 15, 'Review Day', 'What got done? What\'s tomorrow?', '📝');
  add(windDown + 15, 15, 'Wind Down', 'No screens. Breathe. Relax.', '📖');
  add(windDown + 30, 10, 'Sleep', 'Lights out. You earned this.', '🌙');

  // Sort and remove overlaps
  blocks.sort((a, b) => a.start - b.start);

  const clean = [];
  for (const b of blocks) {
    if (b.start < wake || b.start >= bed) continue;
    if (clean.length > 0) {
      const last = clean[clean.length - 1];
      if (b.start < last.start + last.dur) {
        last.dur = Math.max(last.dur, (b.start + b.dur) - last.start);
        continue;
      }
    }
    clean.push({ ...b });
  }

  return clean;
}

function getGoalBlocks(goalType, goalInfo, goalDesc, notePrefs, timeOfDay) {
  const specific = goalDesc || '';
  const dur = timeOfDay === 'morning' ? 90 : 60;

  const goalMap = {
    fitness: [
      { dur: 45, title: 'Goal Work', desc: specific ? `${specific}` : 'Focused training session.', icon: '💪' },
      { dur: 15, title: 'Rest & Review', desc: 'Track progress. What improved?', icon: '📊' }
    ],
    study: [
      { dur: 60, title: 'Deep Study', desc: specific ? `Study: ${specific}` : 'Active recall + practice problems.', icon: '🧠' },
      { dur: 10, title: 'Break', desc: 'Walk, hydrate.', icon: '🚶' },
      { dur: 20, title: 'Flashcard Review', desc: 'Spaced repetition.', icon: '📝' }
    ],
    exams: [

  };

  return goalMap[goalType] || [
    { dur: dur, title: 'Goal Work', desc: specific ? `Work on: ${specific}` : 'Focus on your main goal.', icon: '🎯' }
  ];
}

function generateSchedule() {
  const blocks = buildSchedule();
  if (!blocks) return;

  const goalType = document.getElementById('goal-type').value;
  const goalDesc = document.getElementById('custom-goal').value;
  const goalLabel = goalDesc || document.getElementById('goal-type').options[document.getElementById('goal-type').selectedIndex].text;

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  const now = new Date();
  const currentMin = now.getHours() * 60 + now.getMinutes();

  blocks.forEach((item) => {
    const endMin = item.start + item.dur;
    const block = document.createElement('div');
    block.className = 'time-block';

    if (currentMin >= endMin) block.classList.add('done');
    else if (currentMin >= item.start && currentMin < endMin) block.classList.add('active');

    block.innerHTML = `
      <div class="block-time">${formatTime12(minToTime(item.start))} — ${formatTime12(minToTime(endMin))}</div>
      <div class="block-title">${item.title}</div>
      <div class="block-desc">${item.desc}</div>
      <div class="block-icon">${item.icon}</div>
      <button class="check-btn ${currentMin >= endMin ? 'checked' : ''}" onclick="toggleCheck(this)">✓</button>
    `;

    timeline.appendChild(block);
  });

  document.getElementById('goal-tag').textContent = goalLabel;
  document.getElementById('schedule-title').textContent = 'Your Day';
  document.getElementById('quote').textContent = randomQuote();

  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('schedule-view').style.display = 'block';

  updateProgress();
}

function toggleCheck(btn) {
  btn.classList.toggle('checked');
  const block = btn.closest('.time-block');
  if (btn.classList.contains('checked')) {
    block.classList.add('done');
    block.classList.remove('active');
  } else {
    block.classList.remove('done');
  }
  updateProgress();
}

function updateProgress() {
  const total = document.querySelectorAll('.check-btn').length;
  const checked = document.querySelectorAll('.check-btn.checked').length;
  const pct = total ? (checked / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${checked} / ${total} completed`;
}

function resetForm() {
  document.getElementById('setup-view').style.display = 'block';
  document.getElementById('schedule-view').style.display = 'none';
}
</script>
