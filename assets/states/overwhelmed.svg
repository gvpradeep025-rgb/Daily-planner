  <rect x="30" y="55" width="15" height="10" rx="1" stroke="#555" stroke-width="1" fill="none" transform="rotate(-10 37 60)"/>
  <rect x="75" y="52" width="15" height="10" rx="1" stroke="#555" stroke-width="1" fill="none" transform="rotate(8 82 57)"/>
  <!-- Stickman overwhelmed at desk -->
  <!-- Head -->
  <circle cx="60" cy="38" r="8" stroke="#fff" stroke-width="2"/>
  <!-- Worried eyes -->
  <path d="M56 36 Q57 38 58 36" stroke="#fff" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M62 36 Q63 38 64 36" stroke="#fff" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Body slumped -->
  <path d="M60 46 L58 65" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M58 65 L50 85 M58 65 L68 85" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Arms holding head -->
  <path d="M59 52 L50 40 M59 52 L70 40" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Hands on face -->
  <circle cx="50" cy="38" r="2.5" stroke="#fff" stroke-width="1.5" fill="none"/>
  <circle cx="70" cy="38" r="2.5" stroke="#fff" stroke-width="1.5" fill="none"/>
</svg>
