<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Chaos swirls around head -->
  <path d="M35 25 Q30 20 35 15 Q40 10 38 18" stroke="#ef4444" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M85 25 Q90 20 85 15 Q80 10 82 18" stroke="#ef4444" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M40 18 Q35 12 42 10" stroke="#ef4444" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M80 18 Q85 12 78 10" stroke="#ef4444" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Spiral confusion above head -->
  <path d="M55 15 Q50 10 55 5 Q60 0 65 5 Q70 10 65 15 Q60 20 55 15" stroke="#666" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Desk -->
  <rect x="25" y="65" width="70" height="4" rx="2" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M30 69 L30 95 M90 69 L90 95" stroke="#444" stroke-width="2" stroke-linecap="round"/>
