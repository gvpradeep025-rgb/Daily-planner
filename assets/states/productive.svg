<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Whiteboard -->
  <rect x="15" y="15" width="50" height="40" rx="3" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M22 25 L55 25 M22 33 L48 33 M22 41 L52 41" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Checkmarks on board -->
  <path d="M56 25 L60 29" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M56 33 L60 37" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stickman standing, presenting -->
  <!-- Head -->
  <circle cx="85" cy="35" r="8" stroke="#fff" stroke-width="2"/>
  <!-- Confident smile -->
  <path d="M82 37 Q85 40 88 37" stroke="#fff" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <path d="M85 43 L85 70" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M85 70 L75 92 M85 70 L95 92" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Arm pointing at board -->
  <path d="M85 52 L60 35" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Other arm relaxed -->
  <path d="M85 52 L95 60" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Energy sparkles -->
  <circle cx="100" cy="30" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="105" cy="42" r="1.5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="98" cy="48" r="1" fill="#3b82f6" opacity="0.5"/>
</svg>
