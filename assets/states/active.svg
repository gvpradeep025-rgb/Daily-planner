<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Desk -->
  <rect x="25" y="60" width="70" height="4" rx="2" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M30 64 L30 95 M90 64 L90 95" stroke="#444" stroke-width="2" stroke-linecap="round"/>
  <!-- Laptop -->
  <rect x="38" y="48" width="30" height="12" rx="2" stroke="#666" stroke-width="1.5" fill="none"/>
  <path d="M36 60 L84 60" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Screen active -->
  <rect x="41" y="50" width="24" height="8" rx="1" fill="rgba(34,197,94,0.12)"/>
  <!-- Checkmark on screen -->
  <path d="M50 54 L54 58 L62 50" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stickman active posture -->
  <!-- Head -->
  <circle cx="60" cy="30" r="8" stroke="#fff" stroke-width="2"/>
  <!-- Focused eyes -->
  <circle cx="57" cy="30" r="1" fill="#fff"/>
  <circle cx="63" cy="30" r="1" fill="#fff"/>
  <!-- Body leaning forward -->
  <path d="M60 38 L58 58" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M58 58 L48 78 M58 58 L68 78" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Arms typing -->
  <path d="M59 46 L42 52 M59 46 L76 52" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Focus lines -->
  <path d="M75 28 L82 26" stroke="#22c55e" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M77 33 L84 33" stroke="#22c55e" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M75 38 L82 40" stroke="#22c55e" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>
